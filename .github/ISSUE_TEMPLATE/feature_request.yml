name: Feature request
description: Suggest a feature or an additional release source
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: idea
    attributes:
      label: Feature description
      description: Explain the feature and how it would improve Game Releases.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Optional alternatives or workarounds you have tried.
